name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspaces
        run: npm ci

      - name: Typecheck + unit tests
        run: |
          npm run typecheck
          npm test

      - name: Install Zig 0.16.0
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip" -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath "$env:RUNNER_TEMP\zig"
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\zig\zig-x86_64-windows-0.16.0"

      - name: Build runtime (ReleaseFast)
        working-directory: runtime
        run: zig build -Doptimize=ReleaseFast -Dweb-layer=exclude -Dtrace=off

      - name: Runtime tests
        working-directory: runtime
        run: zig build test -Doptimize=ReleaseFast -Dweb-layer=exclude -Dtrace=off

      - name: Build and test host
        working-directory: host
        run: |
          zig build -Doptimize=ReleaseFast
          zig build test -Doptimize=ReleaseFast

      - name: Portable install ownership smoke
        shell: pwsh
        run: .\cli\test\install-smoke.ps1

      - name: Cross-platform artifact lifecycle smoke
        run: node cli/test/install-smoke.mjs

      - name: Scaffold + check + bundle (headless slice of the v0 gate)
        shell: pwsh
        run: |
          New-Item -ItemType Directory ci-scratch | Out-Null
          Set-Location ci-scratch
          node ..\cli\bin\weaver.js init ciclock
          node ..\cli\bin\weaver.js check ciclock
          node ..\cli\bin\weaver.js bundle ciclock
          if (-not (Test-Path ciclock\dist\bundle.js)) { throw "bundle missing" }
          if (-not (Test-Path ciclock\dist\widget.json)) { throw "manifest missing" }

  macos-baseline:
    name: macOS baseline (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: apple-silicon
            runner: macos-15
            zig_arch: aarch64
          - arch: intel
            runner: macos-15-intel
            zig_arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspaces
        run: npm ci

      - name: Typecheck + unit tests
        run: |
          npm run typecheck
          npm test

      - name: Install Zig 0.16.0
        run: |
          curl --fail --location --retry 3 \
            "https://ziglang.org/download/0.16.0/zig-${{ matrix.zig_arch }}-macos-0.16.0.tar.xz" \
            --output "$RUNNER_TEMP/zig.tar.xz"
          tar -xf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-${{ matrix.zig_arch }}-macos-0.16.0" >> "$GITHUB_PATH"

      - name: Runtime platform-service seam
        working-directory: runtime
        run: zig build test-platform-services

      - name: Build runtime (ReleaseFast)
        working-directory: runtime
        run: zig build -Doptimize=ReleaseFast

      - name: Runtime tests including loopback HTTPS
        working-directory: runtime
        run: zig build test

      - name: Cross-platform artifact lifecycle smoke
        run: node cli/test/install-smoke.mjs

      - name: Native SDK stock profile
        working-directory: runtime/native-sdk
        run: zig build test

      - name: Native SDK Weaver widget profile
        working-directory: runtime/native-sdk
        run: zig build test -Dwidget-profile=true
